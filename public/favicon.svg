<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Croatia Guidebook">
  <title>Croatia Guidebook</title>
  <!-- Хорватская «шаховница» (šahovnica) — национальная клетка, узнаваема в 16px (вкладка + выдача Google).
       5×5, верх-лево красное, 13 красных + 12 белых. Красный #d52b1e — как у флага в шапке (hr-flag.svg). -->
  <rect width="32" height="32" fill="#ffffff"/>
  <g fill="#d52b1e">
    <rect x="0" y="0" width="6.4" height="6.4"/>
    <rect x="12.8" y="0" width="6.4" height="6.4"/>
    <rect x="25.6" y="0" width="6.4" height="6.4"/>
    <rect x="6.4" y="6.4" width="6.4" height="6.4"/>
    <rect x="19.2" y="6.4" width="6.4" height="6.4"/>
    <rect x="0" y="12.8" width="6.4" height="6.4"/>
    <rect x="12.8" y="12.8" width="6.4" height="6.4"/>
    <rect x="25.6" y="12.8" width="6.4" height="6.4"/>
    <rect x="6.4" y="19.2" width="6.4" height="6.4"/>
    <rect x="19.2" y="19.2" width="6.4" height="6.4"/>
    <rect x="0" y="25.6" width="6.4" height="6.4"/>
    <rect x="12.8" y="25.6" width="6.4" height="6.4"/>
    <rect x="25.6" y="25.6" width="6.4" height="6.4"/>
  </g>
</svg>
